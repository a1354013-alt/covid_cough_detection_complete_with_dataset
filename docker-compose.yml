version: "3.8"

services:
  node-backend:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PYTHON_API_URL=http://python-backend:8000
      - RATE_LIMIT_MAX_REQUESTS=30
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      python-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - covid-network

  python-backend:
    build:
      context: ./python_project
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
      - MODEL_PATH=/app/models/model.pt
      - MODEL_DEVICE=auto
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./python_project/models:/app/models
    networks:
      - covid-network

networks:
  covid-network:
    driver: bridge
