name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # actions/setup-node cache for pnpm expects a pnpm executable to exist
      # (it queries the pnpm store path). Install pnpm before setup-node runs.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Verify toolchain
        run: |
          node -v
          pnpm -v

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: JS quality gates
        run: |
          pnpm check
          pnpm lint
          pnpm build
          pnpm test
          pnpm check:version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./python_project[dev]"

      - name: Python quality gates
        run: |
          python -m pytest python_project/tests -q
          python -m compileall python_project/src/covid_cough_detection

