name: CI

on:
  push:
  pull_request:

jobs:
  js-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm check

  js-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm lint

  js-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm build

  js-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm test

  js-version-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm check:version

  js-smoke-contract:
    runs-on: ubuntu-latest
    needs: [js-build, js-check, js-version-contract]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm test:smoke

  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "./python_project[dev]"
      - run: python -m flake8 --config python_project/.flake8 python_project/src/covid_cough_detection python_project/tests
      - run: python -m mypy python_project/src/covid_cough_detection
      - run: python -m pytest python_project/tests -q --cov=covid_cough_detection --cov-report=term-missing
      - run: python -m compileall python_project/src/covid_cough_detection

  docker-build-validation:
    runs-on: ubuntu-latest
    needs: [js-test, python-quality]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build --no-cache
